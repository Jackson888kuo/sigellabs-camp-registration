name: Auto-add Issues to Project Board

# 觸發時機：當 Issue 或 PR 被建立、重新開啟、轉移時
on:
  issues:
    types:
      - opened
      - reopened
      - transferred
  pull_request:
    types:
      - opened
      - reopened

jobs:
  add-to-project:
    name: Add to Sigel Labs 報名系統開發看板
    runs-on: ubuntu-latest
    steps:
      - name: Add issue/PR to project
        uses: actions/add-to-project@v1.0.2
        with:
          # Project 網址（不是 ID）
          project-url: https://github.com/users/Jackson888kuo/projects/2
          # 需要 PAT (Personal Access Token) 含 project 權限
          # 設定路徑：Settings → Secrets and variables → Actions → New secret
          # Secret 名稱：PROJECT_TOKEN
          github-token: ${{ secrets.PROJECT_TOKEN }}
