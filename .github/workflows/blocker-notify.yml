name: Notify on Blocker Label

# 觸發時機：Issue 被加上 blocker label 時，自動留言通知
on:
  issues:
    types:
      - labeled

jobs:
  notify-blocker:
    name: Blocker 通知
    runs-on: ubuntu-latest
    if: github.event.label.name == 'blocker'
    steps:
      - name: 在 Issue 留言通知
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const labeler = context.payload.sender.login;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: [
                `🔴 **Blocker 警示**`,
                ``,
                `本 Issue 已被 @${labeler} 標記為 \`blocker\`。`,
                ``,
                `@Jackson888kuo 請優先處理。SLA: 24 小時內回應。`,
                ``,
                `Issue 已自動移動到 🐞 Needs Fix 欄位（由 label-to-status.yml 處理）。`
              ].join('\n')
            });

            console.log(`已在 Issue #${issue.number} 留言通知`);
